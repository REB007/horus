project: Horus API
sprint: Hackathon Sprint
story_point_scale:
  1: Trivial (< 30 min)
  2: Small (~1h)
  3: Medium (~2-3h)
  5: Large (~half day)
  8: XL (~full day)

epics:
  - id: epic-1
    name: Scaffold & Config
    total_points: 4
    completed_points: 4
    status: done
    stories:
      - id: "1.1"
        title: package.json — npm init, install all deps (express, viem, better-sqlite3, dotenv, cors, node-cron, tsx)
        points: 1
        status: done
        notes: tsx for dev, ts-node not needed

      - id: "1.2"
        title: tsconfig.json + src/config.ts — load + validate all env vars
        points: 1
        status: done
        notes: Throws on missing required vars at startup. Added DOM to lib for viem/ox compat.

      - id: "1.3"
        title: Copy ABIs from contracts/out/ into src/abi/ (PredictionMarketV2, MarketFactoryV2, OutcomeToken)
        points: 1
        status: done
        notes: Extracted via python script from forge build output. 42/14/21 entries.

      - id: "1.4"
        title: .env.example + .gitignore
        points: 1
        status: done
        notes: RPC_URL, ADMIN_PRIVATE_KEY, FACTORY_ADDRESS, USDC_ADDRESS, WETH_ADDRESS, PORT

  - id: epic-2
    name: Chain Client
    total_points: 4
    completed_points: 4
    status: done
    stories:
      - id: "2.1"
        title: src/services/chain.ts — publicClient + walletClient + typed contract helpers
        points: 2
        status: done
        notes: readMarketData(), readUserPositions(), getPoolToken0(), getFactoryContract(), getMarketContract()

      - id: "2.2"
        title: src/services/txbuilder.ts — ABI encode all contract calls → {to, data, value}
        points: 2
        status: done
        notes: buildBuy, buildSell, buildMint, buildRedeem, buildClaim, buildAddLiquidity, buildRemoveLiquidity, buildApprove

  - id: epic-3
    name: Clanker API Client
    total_points: 2
    completed_points: 2
    status: done
    stories:
      - id: "3.1"
        title: src/services/clanker.ts — getTrendingTokens() + getTokenByAddress(), 30s cache
        points: 2
        status: done
        notes: Returns contract_address, name, symbol, img_url, pool_address. Cache with Map + timestamp.

  - id: epic-4
    name: Database
    total_points: 3
    completed_points: 3
    status: done
    stories:
      - id: "4.1"
        title: src/db/migrations/001_init.sql — markets table
        points: 1
        status: done
        notes: address, token_address, token_symbol, token_name, token_img, pool_address, question, resolution_time, resolved, yes_wins, created_at, tx_hash

      - id: "4.2"
        title: src/db/index.ts — open SQLite, run migrations, typed query helpers
        points: 2
        status: done
        notes: insertMarket(), getMarkets(), getMarket(), markResolved(), getUnresolvedExpired()

  - id: epic-5
    name: Market Read Endpoints
    total_points: 5
    completed_points: 5
    status: done
    stories:
      - id: "5.1"
        title: GET /api/markets — DB list + batch on-chain reads (prices, reserves, resolved state)
        points: 3
        status: done
        notes: Sequential readMarketData() per market, graceful fallback to DB values on RPC error

      - id: "5.2"
        title: GET /api/markets/:address — single market detail with full on-chain state
        points: 1
        status: done
        notes: question, reserves, yesPrice, noPrice, resolved, yesWins, snapshotTick, currentTick, token addresses

      - id: "5.3"
        title: GET /api/markets/:address/price — YES/NO prices in BPS
        points: 1
        status: done
        notes: Calls getYesPrice() + getNoPrice() on-chain

  - id: epic-6
    name: Token Discovery Endpoints
    total_points: 2
    completed_points: 2
    status: done
    stories:
      - id: "6.1"
        title: GET /api/tokens/trending — proxy Clanker API, cached 30s
        points: 1
        status: done
        notes: Returns top 20 memecoins with pool_address

      - id: "6.2"
        title: GET /api/tokens/:address — single token info from Clanker
        points: 1
        status: done
        notes: name, symbol, img_url, pool_address

  - id: epic-7
    name: TX Builder Endpoints
    total_points: 4
    completed_points: 4
    status: done
    stories:
      - id: "7.1"
        title: POST /api/markets/:address/buy + /sell — encode calldata, return {to, data, value}
        points: 1
        status: done
        notes: Body {buyYes/sellYes, amount, sender}

      - id: "7.2"
        title: POST /api/markets/:address/mint + /redeem + /claim
        points: 1
        status: done
        notes: Body {amount, sender} for mint/redeem, {sender} for claim

      - id: "7.3"
        title: POST /api/markets/:address/liquidity/add + /remove
        points: 1
        status: done
        notes: Body {amount, sender} for add, {lpAmount, sender} for remove

      - id: "7.4"
        title: POST /api/markets/:address/approve — USDC approval calldata
        points: 1
        status: done
        notes: Returns approve(marketAddress, amount) calldata on USDC contract

  - id: epic-8
    name: Admin Endpoints
    total_points: 4
    completed_points: 4
    status: done
    stories:
      - id: "8.1"
        title: POST /api/admin/markets — fetch Clanker token info, determine token0IsQuote, sign+send createMarket, insert DB
        points: 3
        status: done
        notes: |
          1. Fetch token info from Clanker (name, symbol, img, pool_address)
          2. Read pool.token0() on-chain → compare to WETH → set token0IsQuote
          3. Build question "Will $SYMBOL be UP in 10 min?"
          4. resolutionTime = now + 600
          5. Sign + send createMarket(question, resolutionTime, liquidity, pool, token0IsQuote)
          6. Wait for receipt, get market address from MarketCreated event
          7. Insert market row in DB

      - id: "8.2"
        title: POST /api/admin/markets/:address/resolve — manual trigger (contract reads price on-chain)
        points: 1
        status: done
        notes: Calls resolve() via walletClient, syncs DB after

  - id: epic-9
    name: Auto-Resolver
    total_points: 3
    completed_points: 3
    status: done
    stories:
      - id: "9.1"
        title: src/services/resolver.ts — poll loop every 10s, call resolve() for expired markets
        points: 2
        status: done
        notes: |
          Query DB for unresolved markets past resolutionTime.
          For each: call resolve() on-chain (contract reads Uniswap tick).
          Read yesWins from chain, update DB.
          Handle TX failures with retry next tick.
          Resolve sequentially to avoid nonce conflicts.

      - id: "9.2"
        title: Wire resolver into src/index.ts startup
        points: 1
        status: done
        notes: node-cron every 10s, starts after DB init

  - id: epic-10
    name: User Endpoints
    total_points: 4
    completed_points: 4
    status: done
    stories:
      - id: "10.1"
        title: GET /api/users/:address/positions — YES/NO/LP balances across all markets
        points: 3
        status: done
        notes: Batch balanceOf calls for yesToken, noToken, lpBalances per market

      - id: "10.2"
        title: GET /api/users/:address/claimable — resolved markets with winning balance > 0
        points: 1
        status: done
        notes: Filter resolved markets, check winning token balance for user

  - id: epic-11
    name: Server & Wiring
    total_points: 2
    completed_points: 2
    status: done
    stories:
      - id: "11.1"
        title: src/index.ts — init DB, init chain, mount all routes, start resolver, listen on PORT
        points: 1
        status: done
        notes: Startup order — DB → routes → resolver → HTTP listen

      - id: "11.2"
        title: CORS middleware, global error handler, JSON response helpers
        points: 1
        status: done
        notes: CORS open (*) for dev, 500 handler logs + returns {error} JSON

  - id: epic-12
    name: Integration
    total_points: 4
    completed_points: 0
    status: in_progress
    stories:
      - id: "12.1"
        title: Verify all endpoint shapes match front/lib/api.ts expectations
        points: 2
        status: backlog
        notes: Check field names, types, response structure against frontend API client

      - id: "12.2"
        title: E2E test — pick token → create market → buy YES → wait 10 min → auto-resolve → claim
        points: 2
        status: backlog
        notes: Requires deployed contracts on Base Sepolia

summary:
  total_story_points: 41
  completed_story_points: 37
  in_progress_story_points: 4
  backlog_story_points: 0
  completion_percentage: 90.2%

current_sprint_focus:
  - Epic 12 (integration) — wire frontend, E2E test after contract deployment

dependencies:
  - Contracts must be deployed to Base Sepolia before Epic 12
  - V2 ABIs (PredictionMarketV2, MarketFactoryV2) must be copied before Epic 2
  - ADMIN_PRIVATE_KEY must have USDC balance for market creation (Epic 8)

notes:
  - All amounts are raw decimal strings (6 decimals for USDC)
  - getYesPrice()/getNoPrice() return BPS (0-10000)
  - resolve() takes NO params — contract reads Uniswap slot0() tick itself
  - token0IsQuote determined by reading pool.token0() and comparing to WETH address
  - WETH on Base = 0x4200000000000000000000000000000000000006
  - No DexScreener dependency — price oracle is fully on-chain
  - Auto-resolver is trivial — just calls resolve(), contract does all price logic
