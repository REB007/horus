version: v3
title: "Horus API V3 — Wire to V3 Contracts + Uniswap Price API"
total_sp: 6
sp_unit: "1 SP ≈ 30 min"

context: |
  V3 contracts deployed on Sepolia: MarketFactoryV3 @ 0x4759219b2eb34d8645391E6Bd12B15E35b4e1866
  API currently uses V2 ABIs (PredictionMarketV2, MarketFactoryV2).
  V3 changes: resolve(int256) instead of resolve(), oracle metadata params, permissionless createMarket.
  Need Uniswap Developer API for price reads (snapshot + resolution).
  CPMM functions (buy/sell/mint/redeem/claim/LP) are identical — just ABI swap.
  DB needs new columns for oracle metadata.

key_changes:
  - "ABIs: PredictionMarketV2 → PredictionMarketV3, MarketFactoryV2 → MarketFactoryV3"
  - "resolve(): no args → resolve(int256): API fetches price from Uniswap API"
  - "createMarket(): poolAddress + token0IsQuote → oracleEndpoint + sourceChainId + sourcePool + sourceToken + snapshotPrice"
  - "readMarketData(): snapshotTick/currentTick → snapshotPrice/resolutionPrice + oracle metadata"
  - "New service: uniswap.ts — getUniswapPrice(chainId, tokenAddress)"
  - "Config: add UNISWAP_API_KEY"
  - "DB: add source_chain_id, source_pool, source_token, oracle_endpoint, snapshot_price columns"

files:
  new:
    - src/abi/PredictionMarketV3.json
    - src/abi/MarketFactoryV3.json
    - src/services/uniswap.ts
    - src/db/migrations/002_v3_columns.sql
  modified:
    - src/config.ts
    - src/services/chain.ts
    - src/services/txbuilder.ts
    - src/services/resolver.ts
    - src/routes/admin.ts
    - src/routes/markets.ts
    - src/routes/user.ts
    - src/db/index.ts
    - .env.example
  unchanged:
    - src/index.ts
    - src/routes/trade.ts
    - src/routes/liquidity.ts
    - src/routes/tokens.ts
    - src/services/clanker.ts
    - src/abi/OutcomeToken.json

epics:
  - id: A1
    title: "ABIs + Config"
    sp: 0.5
    status: done
    stories:
      - id: A1.1
        file: src/abi/PredictionMarketV3.json
        sp: 0.25
        status: done
        change: |
          Extract abi array from contracts/out/PredictionMarket_v3.sol/PredictionMarketV3.json.
          Also extract MarketFactoryV3 abi.

      - id: A1.2
        file: src/config.ts
        sp: 0.25
        status: done
        change: |
          Add uniswapApiKey: process.env.UNISWAP_API_KEY || ''.
          Add to .env.example: UNISWAP_API_KEY=

  - id: A7
    title: "DB Migration"
    sp: 0.5
    status: done
    stories:
      - id: A7.1
        file: src/db/migrations/002_v3_columns.sql
        sp: 0.15
        status: done
        change: |
          ALTER TABLE markets ADD COLUMN source_chain_id INTEGER;
          ALTER TABLE markets ADD COLUMN source_pool TEXT;
          ALTER TABLE markets ADD COLUMN source_token TEXT;
          ALTER TABLE markets ADD COLUMN oracle_endpoint TEXT;
          ALTER TABLE markets ADD COLUMN snapshot_price TEXT;

      - id: A7.2
        file: src/db/index.ts
        sp: 0.2
        status: done
        change: |
          Update MarketRow interface: add source_chain_id, source_pool, source_token,
          oracle_endpoint, snapshot_price.
          Update insertMarket() to include new columns.
          Run 002 migration in initDb().

      - id: A7.3
        sp: 0.15
        status: done
        change: "Verify migration runs, old rows still work."

  - id: A2
    title: "Uniswap Price Service"
    sp: 1
    status: done
    depends_on: [A1]
    stories:
      - id: A2.1
        file: src/services/uniswap.ts
        sp: 0.75
        status: done
        change: |
          Create getUniswapPrice(chainId, tokenAddress) → bigint.
          Calls Uniswap Developer API with UNISWAP_API_KEY.
          Returns BigInt(price * 1e18).

      - id: A2.2
        sp: 0.25
        status: done
        change: "Error handling, rate limits, price format validation."

