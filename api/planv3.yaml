implementation_order: "A1 → A7 → A2 → A3 → A4 → A5 → A6 → A8"

breaking_changes:
  - "API response: snapshotTick/currentTick → snapshotPrice/resolutionPrice"
  - "createMarket body: poolAddress + token0IsQuote → sourceChainId + tokenAddress (pool resolved by Clanker)"
  - "resolve: no-arg → price arg (internal, transparent to frontend)"
  - "DB: new nullable columns (backward compatible)"

notes:
  - "FACTORY_ADDRESS already updated in .env to V3"
  - "Old V2 markets in DB will fail readMarketData with V3 ABI — clear DB or add fallback"
  - "Uniswap API key needed for bounty qualification"
  - "txbuilder functions are identical — just ABI swap"
  - "trade.ts and liquidity.ts unchanged — they call txbuilder which handles ABI"
