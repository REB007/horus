  - Base Sepolia deployment (Epic 8) needed before frontend/backend integration
  - Real Clanker pool address needed for smoke test (from Clanker API)

notes:
  - ✅ Epic 1 (13 pts) — V1 core contracts complete
  - ✅ Epic 2 (8 pts) — V1 test suite, 26/26 passing
  - ✅ Epic 3 (1 pt) — IUniswapV3Pool interface
  - ✅ Epic 4 (5 pts) — V2 PredictionMarket with on-chain oracle
  - ✅ Epic 5 (2 pts) — V2 MarketFactory with new createMarket params
  - ✅ Epic 6 (8 pts) — V2 test suite, 33/33 passing
