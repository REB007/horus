version: v3
title: "Horus Contracts V3 — Multi-chain Oracle, Permissionless, zkTLS-ready"
total_sp: 5
sp_unit: "1 SP ≈ 30 min"

context: |
  V2 is deployed on Ethereum Sepolia. Oracle reads slot0().tick from a same-chain Uniswap pool.
  V3 decouples the oracle: admin submits a price (int256, 18 dec) fetched from Uniswap API.
  Oracle metadata (endpoint, chainId, pool, token) stored on-chain for auditability + future zkTLS.
  Market creation is permissionless (anyone with ≥10 USDC).
  CPMM logic (mint/redeem/buy/sell/LP/claim) is UNCHANGED.
  zkTLS, emergency fallback, dispute mechanism are NOT implemented — just enabled by the metadata.

key_changes_from_v2:
  - "Oracle: slot0().tick (same-chain) → submitted int256 price (any chain)"
  - "Resolution: resolve() (reads price) → resolve(int256) (admin submits price)"
  - "Market creation: onlyAdmin → permissionless with MIN_LIQUIDITY = 10 USDC"
  - "Price format: int24 tick → int256 (18 decimals, USD)"
  - "New state: oracleEndpoint, sourceChainId, sourcePool, sourceToken, snapshotPrice, resolutionPrice"
  - "Removed: IUniswapV3Pool, pricePool, snapshotTick, token0IsQuote, getCurrentTick()"

not_implemented:
  - "IZkTlsVerifier interface — future work"
  - "resolveWithProof() — future work, needs zkTLS verifier"
  - "resolveEmergency() — future work, 24h fallback"
  - "Dispute mechanism — future work"
  - "Creator fees — future work"

files:
  new:
    - src/v3/PredictionMarket_v3.sol
    - src/v3/MarketFactory_v3.sol
    - test/v3/PredictionMarketV3.t.sol
    - script/DeployV3.s.sol
  unchanged:
    - src/OutcomeToken.sol

epics:
  - id: C1
    title: PredictionMarketV3
    sp: 2
    status: done
    stories:
      - id: C1.1
        file: src/v3/PredictionMarket_v3.sol
        sp: 0.5
        status: done
        change: |
          Copy V2. Remove: IUniswapV3Pool import, pricePool, snapshotTick,
          token0IsQuote, getCurrentTick(). Remove IUniswapV3Pool interface dependency.

      - id: C1.2
        file: src/v3/PredictionMarket_v3.sol
        sp: 0.25
        status: done
        change: |
          Add oracle metadata state:
            string oracleEndpoint, uint256 sourceChainId,
            address sourcePool, address sourceToken
          Add price state:
            int256 snapshotPrice, int256 resolutionPrice

      - id: C1.3
        file: src/v3/PredictionMarket_v3.sol
        sp: 0.5
        status: done
        change: |
          Update constructor:
            params: _usdc, _admin, _question, _resolutionTime,
              _oracleEndpoint, _sourceChainId, _sourcePool, _sourceToken, _snapshotPrice
            Store all. No slot0() call. No pricePool.

      - id: C1.4
        file: src/v3/PredictionMarket_v3.sol
        sp: 0.25
        status: done
        change: |
          Replace resolve() with resolve(int256 _resolutionPrice):
            require block.timestamp >= resolutionTime
            resolutionPrice = _resolutionPrice
            yesWins = _resolutionPrice > snapshotPrice
            resolved = true
            emit MarketResolved(yesWins)

      - id: C1.5
        file: src/v3/PredictionMarket_v3.sol
        sp: 0.25
        status: done
        change: |
          Remove token0IsQuote tick comparison logic from resolution.
          Verify mint/redeem/buy/sell/LP/claim/views compile unchanged.

      - id: C1.6
        file: src/v3/PredictionMarket_v3.sol
        sp: 0.25
        status: done
        change: "Compile check. All CPMM functions must be identical to V2."

  - id: C2
    title: MarketFactoryV3
    sp: 1
    status: done
    depends_on: [C1]
    stories:
      - id: C2.1
        file: src/v3/MarketFactory_v3.sol
        sp: 0.25
        status: done
        change: |
          Copy V2 factory. Remove onlyAdmin from createMarket.
          Add: MIN_LIQUIDITY = 10 * 1e6 (10 USDC).

      - id: C2.2
        file: src/v3/MarketFactory_v3.sol
        sp: 0.5
        status: done
        change: |
          Update createMarket() — add oracle params:
            _oracleEndpoint, _sourceChainId, _sourcePool, _sourceToken, _snapshotPrice
          Pass to PredictionMarketV3 constructor.
          require _initialLiquidity >= MIN_LIQUIDITY.
          USDC transferred from msg.sender (not admin).

      - id: C2.3
        file: src/v3/MarketFactory_v3.sol
        sp: 0.25
        status: done
        change: |
          Seed liquidity: safeTransferFrom(msg.sender), approve market, addLiquidity.
          Push to markets array, emit MarketCreated.

  - id: C3
    title: Tests
    sp: 1.5
    status: done
    depends_on: [C1, C2]
    stories:
      - id: C3.1
        file: test/v3/PredictionMarketV3.t.sol
        sp: 0.25
        status: done
        change: |
          Setup: MockUSDC, deploy factory as admin, alice creates market
          permissionlessly. SNAPSHOT_PRICE = 1e18.

      - id: C3.2
        file: test/v3/PredictionMarketV3.t.sol
        sp: 0.5
        status: done
        change: |
          Resolution tests:
            test_resolve_priceUp — yesWins = true
            test_resolve_priceDown — yesWins = false
            test_resolve_priceEqual — yesWins = false
            test_resolve_tooEarly — revert
            test_resolve_onlyAdmin — revert
            test_resolve_twice — revert

      - id: C3.3
        file: test/v3/PredictionMarketV3.t.sol
        sp: 0.25
        status: done
        change: |
          Creation tests:
            test_permissionlessCreation — non-admin succeeds
            test_minLiquidityReverts — below 10 USDC reverts
            test_oracleMetadataStored — all fields correct

      - id: C3.4
        file: test/v3/PredictionMarketV3.t.sol
        sp: 0.5
        status: done
        change: |
          Full lifecycle:
            test_fullLifecycle — create → buy YES → resolve (price up) → claim USDC

  - id: C4
    title: Build & Deploy
    sp: 0.5
    status: done
    depends_on: [C3]
    stories:
      - id: C4.1
        file: script/DeployV3.s.sol
        sp: 0.1
        status: done
        change: "Deploy script: read env, deploy MarketFactoryV3, log address."

      - id: C4.2
        sp: 0.2
        status: done
        change: "forge build + forge test --match-path test/v3/* — all green (12/12 pass)"

      - id: C4.3
        sp: 0.2
        status: done
        change: "Deployed to Sepolia. MarketFactoryV3: 0x4759219b2eb34d8645391E6Bd12B15E35b4e1866"

implementation_order: "C1 → C2 → C3 → C4"

breaking_changes:
  - "resolve() → resolve(int256) — ABI change, backend must update"
  - "createMarket() has new oracle params"
  - "createMarket() is permissionless — no onlyAdmin"
  - "USDC transferred from msg.sender, not admin"

notes:
  - "CPMM logic is UNCHANGED — zero risk to trading"
  - "V2 files untouched — V3 is a parallel directory"
  - "Oracle metadata on-chain = foundation for future zkTLS, disputes, emergency fallback"
  - "No dead code — everything in the contract is used today"
  - "After deploy: update API + frontend (separate plans)"
