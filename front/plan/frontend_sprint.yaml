tx_pattern: |
  All transaction panels follow this pattern:
  1. Call API endpoint to get { to, data } calldata
  2. If USDC spend needed: first send approve tx (to=USDC, data=approve calldata)
  3. Wait for approve receipt
  4. Send main tx with useSendTransaction({ to, data })
  5. Wait for receipt with useWaitForTransactionReceipt
  6. Invalidate react-query cache for market data
  7. Toast success/error

notes:
  - All panels already import wagmi hooks — just need to use them
  - useSendTransaction is preferred over useWriteContract since API returns raw calldata
  - USDC on Sepolia has 6 decimals — amounts in API are already in base units
  - No need for a custom hook file — inline wagmi hooks per panel is fine for hackathon
