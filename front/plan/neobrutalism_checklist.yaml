notes:
  - All shadows are HARD DROP SHADOWS (offset, NO BLUR): Xpx Ypx 0px color
  - Shadow color: rgba(212, 175, 55, 0.4-0.7) for golden shadows
  - Border width: 1-2px standard, 2px for emphasis
  - Border color: rgba(212, 175, 55, 0.3-0.6) for standard, higher opacity for emphasis
  - Hover: translate(-2px, -2px) with increased shadow offset (e.g., 4px → 6px)
  - Active: translate(1px, 1px) with decreased shadow offset (e.g., 4px → 2px)
  - Transition: cubic-bezier(0.4, 0, 0.2, 1) for smooth effect (0.2s)
  - Dark mode coherence: #0a0a0a background, #1a1a1a surfaces, high contrast text (#FFFFFF)
  - Use rounded corners: 8px standard, 12px for large cards, 6px for small elements
  - Color palette: #D4AF37 (soft gold), #4ADE80 (soft green), #F87171 (soft red)
  - Ensure all text is readable on dark backgrounds (minimum #999999 for muted text)
