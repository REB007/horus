        file: app/market/[address]/page.tsx
        sp: 0.25
        status: pending
        change: |
          Replace tick display in stats row (~line 152):
          Show price direction (↑/↓) based on resolutionPrice vs snapshotPrice.

      - id: F4.2
        file: app/market/[address]/page.tsx
        sp: 0.25
        status: pending
        change: |
          Replace tick sidebar (~lines 188-200):
          Show "Snapshot Price: $X" and "Resolution Price: $Y" (or "—" if not resolved).

      - id: F4.3
        file: app/market/[address]/page.tsx
        sp: 0.25
        status: pending
        change: |
          Add oracle metadata display in sidebar:
          Oracle endpoint, source chain, source token address.

      - id: F4.4
        file: app/market/[address]/page.tsx
        sp: 0.25
