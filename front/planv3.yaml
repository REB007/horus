version: v3
title: "Horus Frontend V3 — Wire to V3 API + Permissionless Creation"
total_sp: 5
sp_unit: "1 SP ≈ 30 min"

context: |
  API V3 is live and tested (64/64 pass).
  API response now returns snapshotPrice/resolutionPrice instead of snapshotTick/currentTick.
  API response includes oracle metadata: oracleEndpoint, sourceChainId, sourcePool, sourceToken.
  createMarket no longer needs token0IsQuote; needs sourceChainId instead.
  Factory address changed: 0x4759219b2eb34d8645391E6Bd12B15E35b4e1866.
  Market creation is permissionless in V3 — move from admin-only to public /create page.

key_changes:
  - "Market type: snapshotTick/currentTick → snapshotPrice/resolutionPrice + oracle metadata"
  - "Factory address: 0x93ebd... → 0x4759..."
  - "createMarket params: remove token0IsQuote, add sourceChainId"
  - "New /create page: permissionless market creation (any wallet)"
  - "Admin page: remove create section, keep resolve-only"
  - "Market detail: show USD price instead of tick, add oracle metadata"
  - "Nav: add Create link"

files:
  new:
    - app/create/page.tsx
  modified:
    - types/market.ts
    - lib/config.ts
    - lib/api.ts
    - lib/utils.ts
    - app/admin/page.tsx
    - app/market/[address]/page.tsx
    - components/header.tsx
  unchanged:
    - app/page.tsx
    - app/layout.tsx
    - app/providers.tsx
    - app/portfolio/page.tsx
    - components/market-card.tsx
    - components/market-card-skeleton.tsx
    - components/trade-panel.tsx
    - components/mint-redeem-panel.tsx
    - components/liquidity-panel.tsx
    - components/claim-panel.tsx
    - components/custom-connect-button.tsx
    - lib/wagmi.ts

epics:
  - id: F1
    title: "Types + Config"
    sp: 0.5
    status: pending
    stories:
      - id: F1.1
        file: types/market.ts
        sp: 0.25
        status: pending
        change: |
          Remove snapshotTick, currentTick from Market interface.
          Add snapshotPrice (string), resolutionPrice (string),
          oracleEndpoint (string), sourceChainId (string),
          sourcePool (string), sourceToken (string).

      - id: F1.2
        file: lib/config.ts
        sp: 0.1
        status: pending
        change: "Update factory address to 0x4759219b2eb34d8645391E6Bd12B15E35b4e1866."

      - id: F1.3
        file: lib/utils.ts
        sp: 0.15
        status: pending
        change: |
          Add formatPrice18(raw: string): string — converts int256 (18 dec) to USD string.

  - id: F2
    title: "API Client"
    sp: 0.5
    status: pending
    depends_on: [F1]
    stories:
      - id: F2.1
        file: lib/api.ts
        sp: 0.25
        status: pending
        change: |
          Update admin.createMarket params:
          Remove token0IsQuote.
          Add sourceChainId (optional, default 8453).
          Update response type to include snapshotPrice.

      - id: F2.2
        file: lib/api.ts
        sp: 0.25
        status: pending
        change: |
          Update admin.resolveMarket response type:
          Add resolutionPrice: string.

  - id: F3
    title: "Create Market Page"
    sp: 2
    status: pending
    depends_on: [F1, F2]
    stories:
      - id: F3.1
        file: app/create/page.tsx
        sp: 1.0
        status: pending
        change: |
          New page: permissionless market creation.
          Token picker (Clanker trending + manual address).
          Liquidity input (≥ 10 USDC, show min).
          Source chain selector (default Base 8453).
          Preview: question, snapshot price (fetched on submit).
          Submit: POST /api/admin/markets → show result.
          Wallet connection required.

      - id: F3.2
        file: app/create/page.tsx
        sp: 0.5
        status: pending
        change: |
          Wire to API POST /api/admin/markets.
          Show loading state during TX (approve + create ~20s).
          Show success with market address + link.

      - id: F3.3
        file: app/create/page.tsx
        sp: 0.25
        status: pending
        change: "Show snapshot price in preview after API returns."

      - id: F3.4
        file: components/header.tsx
        sp: 0.25
        status: pending
        change: "Add 'Create' nav link between Markets and Portfolio."

